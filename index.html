<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly Dictionary - Smart Dictionary with Audio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1> Wordly <span>Dictionary</span></h1>
            <button id="themeToggle" class="theme-btn"> Dark/Light Mode</button>
        </div>
    </header>

    <main>
        <!-- Search Section -->
        <div class="search-container">
            <div class="search-box">
                <div class="input-group">
                    <label> Enter a word</label>
                    <input type="text" id="wordInput" placeholder="e.g., beautiful, serendipity, magnificent..." required>
                </div>
                <div class="input-group">
                    <label> Select language</label>
                    <select id="languageSelect">
                        <option value="en_US">English (US)</option>
                        <option value="en_GB">English (UK)</option>
                        <option value="es">Español (Spanish)</option>
                        <option value="fr">Français (French)</option>
                        <option value="de">Deutsch (German)</option>
                        <option value="it">Italiano (Italian)</option>
                        <option value="pt">Português (Portuguese)</option>
                        <option value="ru">Русский (Russian)</option>
                        <option value="zh">中文 (Chinese)</option>
                        <option value="ja">日本語 (Japanese)</option>
                    </select>
                </div>
                <button class="search-btn" id="searchBtn"> Search Word</button>
            </div>
        </div>

        <!-- Results Section -->
        <div id="resultsContainer" class="results-container" style="display: none;">
            <div id="resultsContent"></div>
        </div>

        <!-- Favorites Section -->
        <div class="favorites-container">
            <div class="favorites-header">
                <h3> My Favorite Words</h3>
                <button id="clearAllFav" class="clear-btn">Clear All</button>
            </div>
            <ul id="favoritesList">
                <li class="empty-message">No favorites yet. Search for words and click the ★ button to add!</li>
            </ul>
        </div>
    </main>

    <footer>
        <p>Wordly Dictionary © 202| Powered by Free Dictionary API | Double-click any word to hear pronunciation</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
